logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG
    org.springframework.jdbc.core: "ERROR"
    org.springframework.web: "DEBUG"
    root: "INFO"
    com.baeldung: "TRACE"
    de.codecentric.boot.admin.client: "DEBUG"
    org.springframework.boot.actuate: "DEBUG"
  file:
    name: "logs/application.log"
    path: "logs"

# Cấu hình Spring Boot Actuator & Spring Boot Admin Client
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,env,beans,httptrace,threaddump,heapdump,loggers,prometheus,scheduledtasks,sessions"
      base-path: "/actuator"
  endpoint:
    health:
      show-details: "always"
      show-components: "always"
      probes:
        enabled: true
    info:
      enabled: true
    loggers:
      enabled: true
  metrics:
    tags:
      application: "${spring.application.name}"
    distribution:
      percentiles-histogram:
        http.server.requests: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

