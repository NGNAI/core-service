server:
  servlet:
    context-path: "/api/v1"
  port: 8081

spring:
  application:
    name: "NGN AI core"

  main:
    allow-circular-references: true

  servlet:
    multipart:
      max-file-size: "100MB"
      max-request-size: "100MB"

  datasource:
    url: "jdbc:postgresql://192.168.30.72:5432/core_service"
    username: "postgres"
    password: "P@ssw0rd"

  jpa:
    database-platform: "org.hibernate.dialect.PostgreSQLDialect"
    hibernate:
      ddl-auto: "update"
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        validator:
          apply_to_ddl: true

  migration:
    enabled: true
    locations: "classpath:db/migration"
    baseline-on-migrate: true

  data:
    redis:
      password: "P@ssw0rd"
      host: 192.168.30.74
      port: 6379
      timeout: 60000
      lettuce:
        shutdown-timeout: 100

  # Spring Boot Admin Client: đăng ký ứng dụng với Spring Boot Admin Server để theo dõi qua UI
