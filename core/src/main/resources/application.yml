server:
  servlet:
    context-path: "/api/v1"
  port: 8080

spring:
  application:
    name: "NGN AI core"

  servlet:
    multipart:
      max-file-size: "100MB"
      max-request-size: "100MB"

  datasource:
    url: "jdbc:postgresql://192.168.30.72:5432/core_service"
    username: "postgres"
    password: "P@ssw0rd"

  jpa:
    database-platform: "org.hibernate.dialect.PostgreSQLDialect"
    hibernate:
      ddl-auto: "update"
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      password: "P@ssw0rd"
      host: 192.168.30.74
      port: 6379
      timeout: 60000
      lettuce:
        shutdown-timeout: 100

logging:
  level:
    org.springframework.jdbc.core: "DEBUG"
  file:
    name: "logs/application.log"
    path: "logs"

sql:
  init:
    mode: "always"

