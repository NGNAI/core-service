# Cấu hình cho RAG (Retrieval-Augmented Generation)
rag:
  url: "http://192.168.30.75:8002"
  memory:
    # Số lượng message gần nhất trong topic được đưa vào context
    topic-recent-message-window: 10
    # Số lượng message gần nhất trong notebook được đưa vào context
    note-book-recent-message-window: 14
    # Số lượng message tối thiểu để thực hiện nén hội thoại (conversation compression)
    min-messages-to-compress: 4

# Cấu hình cho data ingestion service
ingestion:
  url: "http://192.168.30.73:8000"
  read-timeout-ms: 180000

# Cấu hình cho MinIO (dùng để lưu trữ file đính kèm, notebook source, v.v.)
minio:
  endpoint: "http://192.168.30.71:9000"
  access-key: "admin"
  secret-key: "password"

# Cấu hình cho các API cho việc tích hợp với các service khác (attachment service, ingestion service, v.v.)
integration:
  attachment-api:
    header-name: "X-API-KEY"
    key: "ATTACHMENT_API_KEY_1234567890"
  data-ingestion-api:
    header-name: "X-API-KEY"
    key: "DATA_INGESTION_API_KEY_1234567890"
  data-ingestion-callback:
    # URL để ingestion service callback trạng thái về core service
    url: "http://192.168.30.71:8080/api/v1/user/data-ingestion/ingestion/webhook/status"
    # Shared secret dùng để xác thực webhook callback (máy chủ gọi về phải gửi đúng giá trị này)
    signature: "ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890"
    # Có thể gửi signature qua query param, ví dụ: ?signature=YOUR_WEBHOOK_SHARED_SECRET
    signature-param-name: "signature"
    # Hoặc gửi qua header, ví dụ: X-Webhook-Signature: YOUR_WEBHOOK_SHARED_SECRET
    signature-header-name: "X-Webhook-Signature"
  notebook-source-callback:
    # URL để ingestion service callback trạng thái notebook source về core service
    url: "http://192.168.30.71:8080/api/v1/user/notebooks/sources/ingestion/webhook/status"
    # Shared secret dùng để xác thực webhook callback notebook source
    signature: "ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890"
    # Có thể gửi signature qua query param, ví dụ: ?signature=YOUR_WEBHOOK_SHARED_SECRET
    signature-param-name: "signature"
    # Hoặc gửi qua header, ví dụ: X-Webhook-Signature: YOUR_WEBHOOK_SHARED_SECRET
    signature-header-name: "X-Webhook-Signature"

# Cấu hình cho tính năng tự động ingest dữ liệu từ file (auto-ingestion)
auto-ingestion:
  enabled: true
  input-dir: "D:/input"
  processing-dir: "D:/input/.processing"
  failed-dir: "D:/input/.failed"
  poller-delay-ms: 5000
  file-stable-seconds: 20
  access-level: "GLOBAL"
  from-source: "SYSTEM"
  delete-local-after-success: true

